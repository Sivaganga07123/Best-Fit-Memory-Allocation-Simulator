<html>
<head>
<title>Memory Allocation Simulator - Best Fit</title>
<style>
body{
font-family: Arial;
background:lightblue;
padding:20px;
}
.container{
width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 0px 10px #ccc;
}
h2{
text-align:center;
}
input,select{
width:100%;
padding:8px;
margin:6px 0;
}
button{
padding:10px;
margin-top:10px;
margin-right:5px;
border:none;
border-radius:5px;
cursor:pointer;
}
.allocate{background:#3498db;color:white;}
.next{background:#2ecc71;color:white;}
.reset{background:#e74c3c;color:white;}
.memory{
margin-top:20px;
}
.block{
padding:10px;
margin:5px 0;
border-radius:5px;
color:white;
}
.free{background:gray;}
.allocated{background:green;}
.fragment{background:orange;}
.message{
font-weight:bold;
margin-top:10px;
}
</style>
</head>
<body>
<div class="container">
<h2>Memory Allocation Simulator (BEST FIT)</h2>
<label>Process ID</label>
<input type="text" id="pid">
<label>Process Size</label>
<input type="number" id="psize">
<label>Memory Block Sizes (comma separated)</label>
<input type="text" id="blocks" placeholder="Example: 100,200,300,400">
<label>Partitioning Type</label>
<select id="partition">
<option value="fixed">Fixed Partitioning</option>
<option value="variable">Variable Partitioning</option>
</select>
<label>Allocation Technique</label>
<select>
<option>Best Fit</option>
</select>
<button class="allocate" onclick="allocate()">Allocate Memory</button>
<button class="next" onclick="nextRequest()">Next Request</button>
<button class="reset" onclick="resetAll()">Reset</button>
<div class="message" id="message"></div>
<div class="memory" id="memory"></div>
</div>
<script>
let memory=[];
let initialized=false;
function initMemory(){
let input=document.getElementById("blocks").value;
memory=input.split(",").map(Number);
initialized=true;
}
function allocate(){
if(!initialized){
initMemory();
}
let pid=document.getElementById("pid").value;
let size=parseInt(document.getElementById("psize").value);
let type=document.getElementById("partition").value;
let display=document.getElementById("memory");
let message=document.getElementById("message");
display.innerHTML="";
let bestIndex=-1;
let bestSize=999999;
for(let i=0;i<memory.length;i++){
if(memory[i]>=size && memory[i]<bestSize){
bestSize=memory[i];
bestIndex=i;
}
}
if(bestIndex==-1){
let totalFree=0;
for(let i=0;i<memory.length;i++){
totalFree+=memory[i];
}
if(type=="variable" && totalFree>=size){
let div=document.createElement("div");
div.className="block fragment";
div.innerHTML="External Fragmentation Exists";
display.appendChild(div);
}
message.innerHTML="Memory Allocation Failed";
message.style.color="red";
showMemory();
return;
}
if(type=="fixed"){
let internal=memory[bestIndex]-size;
memory[bestIndex]=-1;
showMemory(bestIndex,pid,size);
if(internal>0){
let frag=document.createElement("div");
frag.className="block fragment";
frag.innerHTML="Internal Fragmentation : "+internal;
display.appendChild(frag);
}
}
else{
memory[bestIndex]=memory[bestIndex]-size;
showMemory(bestIndex,pid,size);
}
message.innerHTML="Process Allocated Successfully";
message.style.color="green";
}
function showMemory(index,pid,size){
let display=document.getElementById("memory");
display.innerHTML="";
for(let i=0;i<memory.length;i++){

let div=document.createElement("div");
if(i==index){
div.className="block allocated";
div.innerHTML="Block "+(i+1)+" : Process "+pid+" allocated ("+size+")";
}
else if(memory[i]==-1){
div.className="block allocated";
div.innerHTML="Block "+(i+1)+" : Already Allocated";
}
else{
div.className="block free";
div.innerHTML="Block "+(i+1)+" : Free ("+memory[i]+")";
}
display.appendChild(div);
}
}
function nextRequest(){
document.getElementById("pid").value="";
document.getElementById("psize").value="";
document.getElementById("message").innerHTML="";
}
function resetAll(){
memory=[];
initialized=false;

document.getElementById("pid").value="";
document.getElementById("psize").value="";
document.getElementById("blocks").value="";
document.getElementById("memory").innerHTML="";
document.getElementById("message").innerHTML="";
}
</script>
</body>
</html>
